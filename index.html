<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>עתיד קורן</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Heebo',sans-serif;
direction:rtl;
background:#0a0a0a;
color:white;
scroll-behavior:smooth;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10%;
}

.hero-text{
max-width:500px;
opacity:0;
transform:translateY(40px);
animation:fadeUp 1s forwards;
}

.hero h1{
font-size:56px;
font-weight:900;
line-height:1.2;
}

.hero p{
opacity:0.7;
margin:20px 0;
}

.btn{
display:inline-block;
padding:16px 40px;
border-radius:50px;
background:white;
color:black;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.hero-img{
width:45%;
height:420px;
background:url('https://images.unsplash.com/photo-1600607687644-c7171b42498b') center/cover;
border-radius:20px;
opacity:0;
transform:translateY(40px);
animation:fadeUp 1.2s forwards;
}

/* SECTION */
.section{
padding:100px 10%;
}

.section h2{
font-size:34px;
margin-bottom:20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
transition:0.3s;
opacity:0;
transform:translateY(40px);
}

.card:hover{
transform:translateY(-10px);
background:#151515;
}

/* FORM */
.form{
padding:100px 10%;
text-align:center;
}

.form-box{
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:15px;
background:white;
color:black;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

/* ANIMATION */
@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<h1>עתיד קורן<br>שליכט וקרניזים ברמה אחרת</h1>

<p>עבודה מדויקת • גימור יוקרתי • תוצאה שמחזיקה לאורך שנים</p>

<a href="#form" class="btn">
השאירו פרטים ונחזור אליכם עם פתרון מדויק
</a>
</div>

<div class="hero-img"></div>

</section>

<!-- VALUE -->
<section class="section">
<h2>למה לבחור בנו</h2>

<div class="cards">

<div class="card">דיוק בפרטים הקטנים</div>
<div class="card">עמידות לאורך זמן</div>
<div class="card">עבודה נקייה ומקצועית</div>

</div>

</section>

<!-- FORM -->
<section class="form" id="form">

<h2>השאירו פרטים</h2>

<div class="form-box">

<input placeholder="שם מלא">
<input placeholder="טלפון">

<button>
שלחו ונחזור אליכם
</button>

</div>

</section>

<script>
// אנימציה בגלילה
let cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
cards.forEach(card => {
let position = card.getBoundingClientRect().top;
if(position < window.innerHeight - 100){
card.style.opacity = 1;
card.style.transform = "translateY(0)";
}
});
});
</script>

</body>
</html>
