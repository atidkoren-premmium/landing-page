<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>עתיד קורן שליכט</title>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '934720149312042');
fbq('track', 'PageView');
</script>

<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    background: #0d0d0d;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1600607687644-c7171b42498b');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 { font-size: 44px; }
.hero p { margin: 20px 0; }

/* כפתור */
.btn {
    padding: 15px 40px;
    border: 2px solid #d4af37;
    color: #d4af37;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #d4af37;
    color: black;
}

/* טופס */
.form-box {
    background: #111;
    padding: 30px;
    border-radius: 10px;
    max-width: 400px;
    margin: 40px auto;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>עבודות שליכט וקרניזים ברמה אחרת</h1>
        <p>דיוק בפרטים הקטנים • גימור יוקרתי • תוצאה שלא מתפשרת</p>

        <button class="btn" onclick="scrollToForm()">
            דברו איתנו עכשיו ותראו את ההבדל
        </button>
    </div>
</section>

<!-- טופס -->
<div class="form-box" id="form">

<h2>השאירו פרטים</h2>

<form id="leadForm" action="https://formspree.io/f/XXXXXXX" method="POST">

<input type="text" name="name" placeholder="שם" required>
<input type="tel" name="phone" placeholder="טלפון" required>

<button class="btn" type="submit">שלחו וקבלו הצעת מחיר</button>

</form>

</div>

<script>
function scrollToForm(){
    document.getElementById("form").scrollIntoView({behavior:"smooth"});
}

// אחרי שליחה
document.getElementById("leadForm").addEventListener("submit", function(){

    // פיקסל ליד
    fbq('track', 'Lead');

    // לקחת נתונים
    let name = document.querySelector("input[name='name']").value;
    let phone = document.querySelector("input[name='phone']").value;

    // שליחה לוואטסאפ
    let message = "שם: " + name + " טלפון: " + phone;
    window.open("https://wa.me/972502542545?text=" + encodeURIComponent(message));

});
</script>

</body>
</html>
