<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    background: #0d0d0d;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1600607687644-c7171b42498b');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 44px;
}

.hero p {
    margin: 20px 0;
    font-size: 18px;
}

/* כפתור */
.btn {
    padding: 15px 40px;
    border: 2px solid #d4af37;
    color: #d4af37;
    text-decoration: none;
    border-radius: 40px;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    background: #d4af37;
    color: black;
}

/* גלריה */
.gallery {
    padding: 60px 20px;
    text-align: center;
}

.gallery h2 {
    margin-bottom: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 20px;
}

.card {
    overflow: hidden;
    border-radius: 10px;
}

.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.1);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>עבודות שליכט וקרניזים ברמה אחרת</h1>
        <p>דיוק בפרטים הקטנים • גימור יוקרתי • תוצאה שלא מתפשרת</p>

        <a class="btn" 
        href="https://wa.me/972XXXXXXXXX"
        onclick="fbq('track', 'Contact');">
        דברו איתנו עכשיו ותראו את ההבדל
        </a>
    </div>
</section>

<!-- גלריה -->
<section class="gallery">
    <h2>פרויקטים נבחרים</h2>

    <div class="grid">
        <div class="card">
            <img src="IMG_0001.PNG">
        </div>

        <div class="card">
            <img src="IMG_0002.PNG">
        </div>

        <div class="card">
            <img src="IMG_0001.PNG">
        </div>

        <div class="card">
            <img src="IMG_0002.PNG">
        </div>
    </div>
</section>

<!-- מעקב גלילה -->
<script>
let scrollTracked = false;

window.addEventListener("scroll", function() {
    let scrollPercent = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;

    if(scrollPercent > 50 && !scrollTracked){
        fbq('track', 'ViewContent');
        scrollTracked = true;
    }
});
</script>

</body>
</html>
